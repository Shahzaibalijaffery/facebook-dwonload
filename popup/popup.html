<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <h1>
        <span class="header-icon">🎬</span>
        <span>Facebook Video Downloader</span>
      </h1>
    </div>

    <div style="padding-bottom: 90px" class="content">
      <div
        id="notificationArea"
        class="notification-area"
        style="display: none"
      ></div>

      <div class="filter-wrap">
        <input
          id="titleFilterInput"
          class="title-filter-input"
          type="text"
          placeholder="Filter by video title or author..."
          aria-label="Filter by video title or author..."
        />
      </div>
      <div id="videoList" class="video-list"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
